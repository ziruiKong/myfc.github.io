<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transfer History | TOPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Libre+Caslon+Display&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#071426;--navy:#101f3a;--burgundy:#6f1f2c;--warm:#f1ece2;--paper:#faf8f3;--line:#101f3a18;--gold:#c6a35b;--muted:#6e7f94}
    *{box-sizing:border-box}
    body{margin:0;background:var(--warm);color:var(--ink);font-family:"DM Sans",sans-serif}a{color:inherit;text-decoration:none}
    .rail{position:fixed;z-index:9;inset:0 auto 0 0;width:200px;background:var(--burgundy);color:var(--warm);border-right:2px solid var(--gold);display:flex;flex-direction:column}.rail-brand{display:grid;place-items:center;width:100%;padding:42px 24px 38px;margin:0 0 40px;background:var(--navy);border-bottom:2px solid var(--gold)}.tops-wordmark{display:block;width:126px;max-width:100%;line-height:0;margin:0 auto}.tops-wordmark img{display:block;width:100%;height:auto}.rail nav{display:flex;flex-direction:column;gap:18px;padding:0 24px;color:var(--warm);font:700 22px/1.06 "Libre Caslon Display",Georgia,serif;letter-spacing:-.025em}.rail nav a:hover,.rail nav a.active{color:var(--gold)}
    .page{margin-left:200px;min-height:100vh}.team-header{position:relative;min-height:300px;padding:56px 0 0;background:linear-gradient(90deg,rgba(2,9,54,.50),rgba(2,9,54,.10)),url('assets/first-team-header.webp') center/cover no-repeat;display:flex;flex-direction:column;justify-content:space-between}.team-header:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,9,54,.08),rgba(2,9,54,.38));pointer-events:none}.team-heading{position:relative;z-index:1;padding:0 clamp(28px,4vw,64px) 42px}.team-heading h1{font:italic 800 clamp(54px,6.8vw,108px)/.82 "Libre Caslon Display",Georgia,serif;margin:0;color:#f1ece2;letter-spacing:-.055em}.team-heading h1 span{display:block}.tabs{--tab-radius:24px;position:relative;z-index:2;width:min(1280px,calc(100% - clamp(56px,10vw,160px)));margin:0 auto -34px;min-height:72px;background:#f8f5ee;border:1px solid #c6a35b70;border-bottom:0;border-radius:var(--tab-radius) var(--tab-radius) 0 0;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-items:start;padding:8px;color:var(--navy);box-shadow:0 -1px 0 #ffffffb0 inset,0 -12px 28px #02093622}.tabs a{height:54px;display:grid;place-items:center;border-radius:16px;border:1px solid transparent;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;text-align:center;color:var(--navy);transition:background .22s ease,color .22s ease,border-color .22s ease,box-shadow .22s ease}.tabs a:hover{border-color:#6f1f2c2e;background:#efe7dc;color:var(--burgundy)}.tabs a.active{background:var(--burgundy);border-color:#c6a35b80;color:#f8f5ee;box-shadow:0 12px 22px #101f3a24}
    .transfers{padding:88px clamp(28px,4vw,70px) 90px;background:linear-gradient(180deg,#f1ece2,#f8f5ee 48%,#f1ece2)}.market-shell{display:grid;gap:22px}.market-overview{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px}.overview-card{background:#fffaf2;border:1px solid var(--line);padding:18px 18px 16px;box-shadow:0 12px 28px #101f3a0c}.overview-card span{display:block;margin-bottom:16px;color:#7b8aa0;font-size:10px;font-weight:900;letter-spacing:.18em;text-transform:uppercase}.overview-card b{display:block;color:var(--navy);font:900 34px/.9 "Libre Caslon Display",Georgia,serif;letter-spacing:-.04em}.overview-card.accent{background:linear-gradient(115deg,var(--burgundy),#4c263f 58%,var(--navy));border-color:#c6a35b60}.overview-card.accent span,.overview-card.accent b{color:#f8f5ee}
    .market-controls{display:grid;grid-template-columns:auto minmax(260px,1fr) auto;gap:14px;align-items:center;background:#fffaf2;border:1px solid var(--line);padding:14px;box-shadow:0 12px 28px #101f3a0c}.segmented{display:flex;gap:6px;background:#f1ece2;border:1px solid var(--line);padding:5px}.segment{height:38px;border:0;background:transparent;color:var(--navy);padding:0 14px;font-size:11px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}.segment.active{background:var(--burgundy);color:#f8f5ee}.market-search{height:48px;width:100%;border:1px solid var(--line);background:#fff;color:var(--navy);padding:0 16px;font-size:14px;font-weight:800}.window-select{height:48px;border:1px solid var(--line);background:#fff;color:var(--navy);padding:0 42px 0 14px;font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase}
    .window-card{background:#fffaf2;border:1px solid var(--line);box-shadow:0 16px 34px #101f3a10;margin-bottom:28px}.window-head{display:flex;align-items:end;justify-content:space-between;gap:20px;padding:28px 28px 24px;border-bottom:1px solid var(--line)}.window-head p{margin:0 0 8px;color:#7b8aa0;font-size:10px;font-weight:900;letter-spacing:.22em;text-transform:uppercase}.window-head h2{margin:0;color:var(--navy);font:800 clamp(34px,4vw,54px)/.9 "Libre Caslon Display",Georgia,serif;letter-spacing:-.045em}.window-badge{display:inline-grid;place-items:center;min-height:34px;padding:0 14px;border:1px solid #c6a35b70;color:var(--burgundy);font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}
    .transfer-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;padding:22px}.transfer-section{min-width:0}.transfer-section.arrivals{grid-column:1/-1}.transfer-section.arrivals .transfer-list{grid-template-columns:repeat(2,minmax(320px,1fr))}.transfer-section h3{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px;color:var(--burgundy);font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase}.section-count{display:inline-grid;place-items:center;min-width:28px;height:22px;border:1px solid var(--line);color:var(--navy);font-size:10px;letter-spacing:0}.transfer-list{display:grid;gap:10px}.transfer-row{position:relative;display:block;background:#fff;border:1px solid #101f3a12;padding:14px 44px 14px 16px;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease,background .2s ease}.transfer-row:hover{transform:translateY(-2px);background:#fffaf2;border-color:#6f1f2c38;box-shadow:0 12px 24px #101f3a12}.transfer-player{display:flex;align-items:baseline;gap:12px;min-width:0;margin-bottom:12px}.transfer-player a,.transfer-player b{display:block;color:var(--navy);font-size:17px;font-weight:900;line-height:1.12;white-space:normal;overflow:visible;text-overflow:clip}.transfer-player span{flex:0 0 auto;color:var(--burgundy);font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}.transfer-details{display:grid;grid-template-columns:minmax(110px,1fr) minmax(100px,1fr) auto;gap:14px;align-items:end}.transfer-meta small{display:block;margin-bottom:4px;color:#7b8aa0;font-size:8px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}.transfer-meta b{display:block;color:var(--navy);font-size:12px;font-weight:900}.transfer-fee{color:var(--navy);font-size:14px;font-weight:900;text-align:right}.transfer-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--burgundy);font-size:18px;font-weight:900}.is-hidden{display:none}.empty-state{padding:20px;background:#fff;border:1px solid var(--line);color:#7b8aa0;font-weight:800}
    footer{background:#020936;color:#f1ece2;padding:74px 0 0;overflow:hidden}.tops-pattern{overflow:hidden}.tops-pattern-track{display:flex;align-items:center;gap:76px;width:max-content;animation:topsMarquee 24s linear infinite}.tops-pattern-item{display:flex;align-items:center;gap:.16em;white-space:nowrap;color:#f1ece2;font:italic clamp(128px,13.8vw,228px)/.78 Georgia,serif;letter-spacing:-.065em;text-transform:uppercase}.tops-pattern-item img{width:.86em;height:.86em;object-fit:contain;display:block;transform:translateY(-.015em)}@keyframes topsMarquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @media(max-width:1200px){.transfer-grid{grid-template-columns:1fr 1fr}.transfer-section.arrivals .transfer-list{grid-template-columns:1fr}.transfer-section.loans{grid-column:1/-1}.transfer-section.loans .transfer-list{grid-template-columns:repeat(2,minmax(280px,1fr))}}@media(max-width:1100px){.market-overview{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.rail{display:none}.page{margin-left:0}.tabs{width:calc(100% - 24px);grid-template-columns:repeat(2,1fr);border-radius:24px 24px 0 0}.transfers{padding:70px 12px}.market-overview{grid-template-columns:1fr}.market-controls{grid-template-columns:1fr}.segmented{width:100%}.segment{flex:1}.window-head{align-items:flex-start;flex-direction:column}.transfer-grid{grid-template-columns:1fr;padding:14px}.transfer-section.arrivals .transfer-list,.transfer-section.loans .transfer-list{grid-template-columns:1fr}.transfer-details{grid-template-columns:1fr}.transfer-fee{text-align:left}.transfer-arrow{display:none}}
  </style>
</head>
<body>
  <aside class="rail"><a class="rail-brand" href="index.html#top" aria-label="TOPS home"><span class="tops-wordmark"><img src="assets/sidebar-sculpture-logo.webp" alt="TOPS"></span></a><nav><a href="index.html#fixtures">Matches</a><a class="active" href="mens-first-team.html">Teams</a><a href="index.html#tickets">Tickets</a><a href="index.html#membership">Membership</a><a href="index.html#shop">Shop IFC</a><a href="index.html#play">IFC PLAY</a><a href="index.html#club">The Club</a><a href="index.html#latest">Explore</a></nav></aside>
  <main class="page">
    <header class="team-header"><div class="team-heading"><h1><span>TRANSFER</span><span>HISTORY</span></h1></div><nav class="tabs"><a href="mens-first-team.html#squad">Squad</a><a href="history-rankings.html">History Rankings</a><a href="squad-finance.html">Finance</a><a class="active" href="transfer-history.html">Transfers</a><a href="predecessor-players.html">Predecessor</a></nav></header>
    <section class="transfers"><div class="market-shell"><div class="market-overview" data-market-overview></div><div class="market-controls"><div class="segmented" aria-label="Transfer direction"><button class="segment active" type="button" data-direction="all">All</button><button class="segment" type="button" data-direction="arrivals">Arrivals</button><button class="segment" type="button" data-direction="departures">Departures</button><button class="segment" type="button" data-direction="loans">Loans</button></div><input class="market-search" type="search" placeholder="Search player, club or fee" data-transfer-search><select class="window-select" data-window-select aria-label="Transfer window"></select></div><div data-transfer-list></div></div></section>
    <footer><div class="tops-pattern" aria-label="TOPS brand pattern"><div class="tops-pattern-track"><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span></div></div></footer>
  </main>
  <script src="assets/player-data.js"></script>
  <script src="assets/predecessor-player-data.js"></script>
  <script src="assets/transfer-data.js"></script>
  <script>
    const predecessorPlayers = new Set((window.TOPS_PREDECESSOR_PLAYER_DATA || []).map((player) => player.id));
    const currentPlayers = new Set((window.TOPS_PLAYER_DATA || []).map((player) => player.id));
    const allPlayers = new Set([...(window.TOPS_PLAYER_DATA || []), ...(window.TOPS_PREDECESSOR_PLAYER_DATA || [])].map((player) => player.id));
    const transferData = window.TOPS_TRANSFER_DATA || { windows: [] };
    const state = { direction: "all", query: "", windowId: "all" };
    const moneyValue = (fee) => {
      const match = String(fee).match(/EUR([\d.]+)m/i);
      return match ? Number(match[1]) : 0;
    };
    const formatMoney = (value) => value ? `&euro;${value.toFixed(1)}m` : "Player exchange";
    const displayMoney = (text) => String(text).replace(/EUR/g, "&euro;");
    const displayClubName = (name) => String(name || "").replace(/\s+F\.?C\.?$/i, "").trim();
    const playerHref = (id) => allPlayers.has(id) ? `${predecessorPlayers.has(id) ? "predecessor-detail.html" : "player-detail.html"}?id=${id}` : "";
    const playerLink = (item, type) => {
      const href = playerHref(item.playerId);
      return `<div class="transfer-player">${href ? `<a href="${href}">${item.player}</a>` : `<b>${item.player}</b>`}<span>${type}</span></div>`;
    };
    const allWindows = () => state.windowId === "all" ? transferData.windows : transferData.windows.filter((item) => item.id === state.windowId);
    const matchesQuery = (item) => {
      const haystack = Object.values(item).join(" ").toLowerCase();
      return !state.query || haystack.includes(state.query);
    };
    const itemsForWindow = (windowItem, type) => windowItem[type] || [];
    const filteredItems = (windowItem, type) => itemsForWindow(windowItem, type).filter(matchesQuery);
    const renderRow = (item, type, windowItem) => {
      const isIncoming = type === "arrivals" || type === "academyPromotions";
      const clubLabel = isIncoming ? "From" : "Destination";
      const clubValue = displayClubName(isIncoming ? item.from : item.destination);
      const typeLabel = type === "arrivals" ? "Arrival" : type === "academyPromotions" ? "Academy" : type === "loansOut" ? "Loan Out" : "Departure";
      const detailLabel = isIncoming ? (item.type ? "Type" : "Weekly Wage") : type === "loansOut" ? "Type" : "Window";
      const detailValue = isIncoming ? displayMoney(item.type || item.weeklyWage) : type === "loansOut" ? item.type : item.date ? `${item.date} / ${windowItem.season}` : windowItem.season;
      const href = playerHref(item.playerId);
      return `
        <article class="transfer-row" ${href ? `onclick="location.href='${href}'"` : ""}>
          ${playerLink(item, typeLabel)}
          <div class="transfer-details">
            <div class="transfer-meta"><small>${clubLabel}</small><b>${clubValue}</b></div>
            <div class="transfer-meta"><small>${detailLabel}</small><b>${detailValue}</b></div>
            <div class="transfer-fee">${displayMoney(item.fee || item.note || item.type)}</div>
          </div>
          <div class="transfer-arrow">></div>
        </article>
      `;
    };
    const renderOverview = () => {
      const windows = allWindows();
      const arrivals = windows.flatMap((item) => [...itemsForWindow(item, "arrivals"), ...itemsForWindow(item, "academyPromotions")]);
      const departures = windows.flatMap((item) => itemsForWindow(item, "departures"));
      const loans = windows.flatMap((item) => itemsForWindow(item, "loansOut"));
      const spend = arrivals.reduce((sum, item) => sum + moneyValue(item.fee), 0);
      const income = departures.reduce((sum, item) => sum + moneyValue(item.fee), 0);
      document.querySelector('[data-market-overview]').innerHTML = `
        <div class="overview-card accent"><span>Net Spend</span><b>${formatMoney(spend - income)}</b></div>
        <div class="overview-card"><span>Arrivals</span><b>${arrivals.length}</b></div>
        <div class="overview-card"><span>Departures</span><b>${departures.length + loans.length}</b></div>
        <div class="overview-card"><span>Total Volume</span><b>${formatMoney(spend + income)}</b></div>
      `;
    };
    const renderWindows = () => {
      renderOverview();
      document.querySelector('[data-transfer-list]').innerHTML = allWindows().map((windowItem) => {
        const arrivals = filteredItems(windowItem, "arrivals");
        const academyPromotions = filteredItems(windowItem, "academyPromotions");
        const departures = filteredItems(windowItem, "departures");
        const loansOut = filteredItems(windowItem, "loansOut");
        const showArrivals = state.direction === "all" || state.direction === "arrivals";
        const showAcademy = state.direction === "all" || state.direction === "arrivals";
        const showDepartures = state.direction !== "arrivals" && state.direction !== "loans";
        const showLoans = state.direction === "all" || state.direction === "loans";
        return `
          <article class="window-card">
            <div class="window-head"><div><p>${windowItem.summary}</p><h2>${windowItem.season} ${windowItem.window}</h2></div><span class="window-badge">First-team window</span></div>
            <div class="transfer-grid">
              <section class="transfer-section arrivals ${showArrivals ? "" : "is-hidden"}"><h3>Arrivals <span class="section-count">${arrivals.length}</span></h3><div class="transfer-list">${arrivals.length ? arrivals.map((item) => renderRow(item, "arrivals", windowItem)).join('') : `<div class="empty-state">No arrivals match this search.</div>`}</div></section>
              <section class="transfer-section academy ${showAcademy && academyPromotions.length ? "" : "is-hidden"}"><h3>Academy Promotion <span class="section-count">${academyPromotions.length}</span></h3><div class="transfer-list">${academyPromotions.map((item) => renderRow(item, "academyPromotions", windowItem)).join('')}</div></section>
              <section class="transfer-section departures ${showDepartures ? "" : "is-hidden"}"><h3>Departures <span class="section-count">${departures.length}</span></h3><div class="transfer-list">${departures.length ? departures.map((item) => renderRow(item, "departures", windowItem)).join('') : `<div class="empty-state">No departures match this search.</div>`}</div></section>
              <section class="transfer-section loans ${showLoans ? "" : "is-hidden"}"><h3>Loan Out <span class="section-count">${loansOut.length}</span></h3><div class="transfer-list">${loansOut.length ? loansOut.map((item) => renderRow(item, "loansOut", windowItem)).join('') : `<div class="empty-state">No loans match this search.</div>`}</div></section>
            </div>
          </article>
        `;
      }).join('');
    };
    document.querySelector('[data-window-select]').innerHTML = `<option value="all">All windows</option>${transferData.windows.map((item) => `<option value="${item.id}">${item.season} ${item.window}</option>`).join('')}`;
    document.querySelectorAll('[data-direction]').forEach((button) => {
      button.addEventListener('click', () => {
        state.direction = button.dataset.direction;
        document.querySelectorAll('[data-direction]').forEach((item) => item.classList.toggle('active', item === button));
        renderWindows();
      });
    });
    document.querySelector('[data-transfer-search]').addEventListener('input', (event) => {
      state.query = event.target.value.trim().toLowerCase();
      renderWindows();
    });
    document.querySelector('[data-window-select]').addEventListener('change', (event) => {
      state.windowId = event.target.value;
      renderWindows();
    });
    renderWindows();
  </script>
</body>
</html>
