<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Predecessor Players | TOPS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Libre+Caslon+Display&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#071426;--navy:#101f3a;--burgundy:#6f1f2c;--warm:#f1ece2;--paper:#faf8f3;--line:#101f3a18;--gold:#c6a35b}
    *{box-sizing:border-box}
    body{margin:0;background:var(--warm);color:var(--ink);font-family:"DM Sans",sans-serif}
    a{color:inherit;text-decoration:none}
    .rail{position:fixed;z-index:9;inset:0 auto 0 0;width:200px;background:var(--burgundy);color:var(--warm);border-right:2px solid var(--gold);display:flex;flex-direction:column}
    .rail-brand{display:grid;place-items:center;width:100%;padding:42px 24px 38px;margin:0 0 40px;background:var(--navy);border-bottom:2px solid var(--gold)}
    .tops-wordmark{display:block;width:126px;max-width:100%;line-height:0;margin:0 auto}.tops-wordmark img{display:block;width:100%;height:auto}
    .rail nav{display:flex;flex-direction:column;gap:18px;padding:0 24px;color:var(--warm);font:700 22px/1.06 "Libre Caslon Display",Georgia,serif;letter-spacing:-.025em}
    .rail nav a:hover,.rail nav a.active{color:var(--gold)}
    .page{margin-left:200px;min-height:100vh}
    .hero{padding:58px clamp(28px,4vw,70px) 34px;background:linear-gradient(90deg,rgba(16,31,58,.82),rgba(16,31,58,.45)),url('assets/first-team-header.webp') center/cover;color:var(--warm)}
    .back-link{display:inline-flex;align-items:center;gap:10px;margin-bottom:38px;color:var(--gold);font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    .hero h1{max-width:900px;font:800 clamp(56px,7vw,108px)/.82 "Libre Caslon Display",Georgia,serif;margin:0;letter-spacing:-.055em}
    .hero p{max-width:680px;margin:22px 0 0;font-size:17px;line-height:1.55;color:#f1ece2d8}
    .toolbar{display:grid;grid-template-columns:minmax(220px,360px) auto 1fr;gap:14px;align-items:center;padding:28px clamp(28px,4vw,70px);border-bottom:1px solid var(--line)}
    .search,.filter{height:46px;border:1px solid #101f3a26;background:#fff;color:var(--navy);border-radius:6px;padding:0 15px;font-weight:700}
    .filter{appearance:none;min-width:170px;padding-right:40px;background:#fff linear-gradient(45deg,transparent 50%,var(--navy) 50%),linear-gradient(135deg,var(--navy) 50%,transparent 50%);background-position:calc(100% - 22px) 19px,calc(100% - 16px) 19px;background-size:6px 6px,6px 6px;background-repeat:no-repeat}
    .count{text-align:right;color:#101f3a9a;font-weight:800}
    .archive{padding:30px clamp(28px,4vw,70px) 90px}
    .player-grid{display:grid;grid-template-columns:repeat(4,minmax(230px,1fr));gap:22px}
    .archive-card{position:relative;min-height:310px;background:#e5dccd;overflow:hidden;border:1px solid #101f3a0d;display:flex;flex-direction:column;justify-content:flex-end;transition:transform .25s ease,box-shadow .25s ease}
    .archive-card:hover{transform:translateY(-4px);box-shadow:0 20px 40px #101f3a18}
    .archive-card:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#f1ece240,#cfc3b252),url('assets/home-kit-story-pattern.webp') center/cover;opacity:.58}
    .archive-card:after{content:"";position:absolute;inset:0;pointer-events:none}
    .archive-card>img{position:absolute;z-index:1;left:0;right:0;bottom:78px;width:100%;height:230px;object-fit:contain;object-position:center bottom}
    .card-top{position:absolute;z-index:2;top:16px;left:16px;right:16px;display:flex;align-items:center;justify-content:flex-end}
    .pill{display:inline-grid;place-items:center;min-width:46px;height:22px;border-radius:999px;border:1px solid #f8f5ee80;background:#f8f5ee35;color:var(--navy);backdrop-filter:blur(8px);font-size:9px;font-weight:900;letter-spacing:.12em}
    .archive-info{position:relative;z-index:2;background:var(--warm);border-top:1px solid var(--line);padding:18px 16px 16px}
    .name-row{display:flex;align-items:center;justify-content:space-between;gap:14px}.name-row b{display:block;min-width:0;font:800 32px/.88 "Libre Caslon Display",Georgia,serif;color:var(--navy);letter-spacing:-.045em}.card-flag{flex:0 0 auto;width:32px;height:32px;border-radius:50%;background:#f8f5ee;border:1px solid #101f3a24;padding:4px;box-shadow:0 8px 18px #101f3a16}.card-flag img{display:block;width:100%;height:100%;object-fit:cover;border-radius:50%}.archive-info>span{display:block;margin-top:11px;color:#101f3a9a;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
    .is-hidden{display:none}
    footer{background:#020936;color:#f1ece2;padding:74px 0 0;overflow:hidden}.tops-pattern{overflow:hidden}.tops-pattern-track{display:flex;align-items:center;gap:76px;width:max-content;animation:topsMarquee 24s linear infinite}.tops-pattern-item{display:flex;align-items:center;gap:.16em;white-space:nowrap;color:#f1ece2;font:italic clamp(128px,13.8vw,228px)/.78 Georgia,serif;letter-spacing:-.065em;text-transform:uppercase}.tops-pattern-item img{width:.86em;height:.86em;object-fit:contain;display:block;transform:translateY(-.015em)}@keyframes topsMarquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    @media(max-width:1280px){.player-grid{grid-template-columns:repeat(3,minmax(230px,1fr))}}@media(max-width:960px){.player-grid{grid-template-columns:repeat(2,minmax(230px,1fr))}.toolbar{grid-template-columns:1fr 1fr}.count{text-align:left}}@media(max-width:760px){.rail{display:none}.page{margin-left:0}.toolbar{grid-template-columns:1fr}.player-grid{grid-template-columns:1fr}.count{text-align:left}}
  </style>
</head>
<body>
  <aside class="rail">
    <a class="rail-brand" href="index.html#top" aria-label="TOPS home"><span class="tops-wordmark"><img src="assets/sidebar-sculpture-logo.webp" alt="TOPS"></span></a>
    <nav><a href="index.html#fixtures">Matches</a><a class="active" href="mens-first-team.html">Teams</a><a href="index.html#tickets">Tickets</a><a href="index.html#membership">Membership</a><a href="index.html#shop">Shop IFC</a><a href="index.html#play">IFC PLAY</a><a href="index.html#club">The Club</a><a href="index.html#latest">Explore</a></nav>
  </aside>
  <main class="page">
    <header class="hero">
      <a class="back-link" href="mens-first-team.html">Back to current squad</a>
      <h1>PREDECESSOR PLAYERS</h1>
      <p>Club archive records for players who featured in the 2025/26 all-competitions data and are no longer listed in the current men's first team squad.</p>
    </header>
    <div class="toolbar">
      <input class="search" type="search" placeholder="Search players" data-search>
      <select class="filter" data-position-filter aria-label="Filter by position">
        <option value="all">All positions</option>
        <option value="goalkeeper">Goalkeepers</option>
        <option value="defender">Defenders</option>
        <option value="midfielder">Midfielders</option>
        <option value="forward">Forwards</option>
      </select>
      <div class="count" data-count></div>
    </div>
    <section class="archive">
      <div class="player-grid" data-grid></div>
    </section>
    <footer><div class="tops-pattern" aria-label="TOPS brand pattern"><div class="tops-pattern-track"><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span><span class="tops-pattern-item">TOPS <img src="assets/islington-hat-cream-transparent.webp" alt=""></span></div></div></footer>
  </main>
  <script src="assets/predecessor-player-data.js"></script>
  <script>
    const players = window.TOPS_PREDECESSOR_PLAYER_DATA || [];
    const grid = document.querySelector('[data-grid]');
    const search = document.querySelector('[data-search]');
    const filter = document.querySelector('[data-position-filter]');
    const count = document.querySelector('[data-count]');
    const normalizePosition = (position) => position.toLowerCase();
    grid.innerHTML = players.map((player) => `
      <a class="archive-link" href="predecessor-detail.html?id=${player.id}" data-name="${player.name.toLowerCase()}" data-position="${normalizePosition(player.position)}">
        <article class="archive-card">
          ${player.photo ? `<img src="${player.photo}" alt="${player.name}">` : ''}
          <div class="card-top"><span class="pill">${player.positionShort}</span></div>
          <div class="archive-info"><div class="name-row"><b>${player.name}</b>${player.flag ? `<span class="card-flag"><img src="${player.flag}" alt="${player.nationality}"></span>` : ''}</div><span>${player.nationality} / ${player.seasons}</span></div>
        </article>
      </a>
    `).join('');
    const links = [...document.querySelectorAll('.archive-link')];
    const applyFilters = () => {
      const query = search.value.trim().toLowerCase();
      const position = filter.value;
      let visible = 0;
      links.forEach((link) => {
        const matchesName = !query || link.dataset.name.includes(query);
        const matchesPosition = position === 'all' || link.dataset.position === position;
        const show = matchesName && matchesPosition;
        link.classList.toggle('is-hidden', !show);
        if (show) visible += 1;
      });
      count.textContent = `${visible} archive players`;
    };
    search.addEventListener('input', applyFilters);
    filter.addEventListener('change', applyFilters);
    applyFilters();
  </script>
</body>
</html>
